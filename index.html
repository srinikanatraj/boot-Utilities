<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Utilities Project</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="bg-light">

<!-- 🔝 Navbar -->
<nav class="navbar navbar-dark bg-dark fixed-top">
  <span class="navbar-brand">Utility Project</span>
</nav>

<div class="container mt-5 pt-5">

  <!-- 🟦 Typography + Colors -->
  <div class="text-center mb-5">
    <h1 class="display-4 text-primary">Bootstrap Utilities</h1>
    <p class="lead text-muted">Using only utility classes</p>
  </div>

  <!-- 📦 Cards Section -->
  <div class="row">

    <!-- Card 1 -->
    <div class="col-md-4 mb-4">
      <div class="p-4 bg-white shadow rounded border border-primary text-center">
        <h4 class="text-success font-weight-bold">Box 1</h4>
        <p class="text-muted">Spacing + colors + border</p>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4 mb-4">
      <div class="p-4 bg-warning shadow-lg rounded-lg text-center">
        <h4 class="text-dark">Box 2</h4>
        <p>Shadow and rounded</p>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4 mb-4">
      <div class="p-4 bg-info text-white rounded-circle text-center d-flex align-items-center justify-content-center" style="height:200px;">
        Circle
      </div>
    </div>

  </div>

  <!-- 📏 Width & Height -->
  <div class="mb-5">
    <div class="bg-success text-white w-25 p-2 mb-2">25%</div>
    <div class="bg-success text-white w-50 p-2 mb-2">50%</div>
    <div class="bg-success text-white w-75 p-2 mb-2">75%</div>
    <div class="bg-success text-white w-100 p-2">100%</div>
  </div>

  <!-- 🔀 Float & Clearfix -->
  <div class="clearfix mb-5 border p-3">
    <span class="float-left bg-primary text-white p-2">Left</span>
    <span class="float-right bg-danger text-white p-2">Right</span>
  </div>

  <!-- 👁 Visibility -->
  <div class="mb-5">
    <p class="visible bg-light p-2">I am visible</p>
    <p class="invisible bg-light p-2">I am invisible</p>
  </div>

  <!-- 📐 Flexbox -->
  <div class="d-flex justify-content-between bg-dark text-white p-3 mb-5">
    <div>Flex 1</div>
    <div>Flex 2</div>
    <div>Flex 3</div>
  </div>

  <!-- 🔽 Fixed Bottom -->
  <div class="bg-dark text-white text-center p-3 fixed-bottom">
    Fixed Footer
  </div>

</div>

</body>
</html>
